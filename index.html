<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean Water Sweep</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="game-container">
    <header class="game-header">
      <div class="logo-strip">
        <img src="img/cw_logo_horizontal.png" alt="charity: water supporter logo" class="main-logo" />
      </div>

      <div class="title-row">
        <img src="img/water-can-transparent.png" alt="" class="title-can" />

        <div>
          <h1>Clean Water Sweep</h1>
          <p>
            Reveal clean water tiles, avoid polluted drops, and protect the community water source.
          </p>
    </header>

    <section class="stats">
      <div class="stat-card">
        <span>Safe Tiles</span>
        <strong id="safeCount">0</strong>
      </div>

      <div class="stat-card">
        <span>Lives</span>
        <strong id="livesCount">3</strong>
      </div>

      <div class="stat-card">
        <span>Time</span>
        <strong id="timer">50</strong>
      </div>
    </section>

    <button id="startButton">Start Game</button>

    <section id="gameBoard" class="game-board"></section>

    <p id="message" class="message">
      Click start, then tap a tile to begin finding clean water.
    </p>

    <p id="factBox" class="fact-box">
      Clean water changes everything.
    </p>
  </main>

  <script src="script.js"></script>
</body>

</html>
